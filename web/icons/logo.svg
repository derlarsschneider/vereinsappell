<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#1a3a1a"/>

  <!-- 6 person silhouettes, neck points on circle R=40 from center (64,64) -->
  <!-- Top: neck(64,24) head(64,17) -->
  <circle cx="64" cy="17" r="7" fill="#4caf50"/>
  <path d="M54 31 Q64 24 74 31 L74 37 L54 37 Z" fill="#4caf50"/>

  <!-- Top-right: neck(99,44) head(99,37) -->
  <circle cx="99" cy="37" r="7" fill="#4caf50"/>
  <path d="M89 51 Q99 44 109 51 L109 57 L89 57 Z" fill="#4caf50"/>

  <!-- Bottom-right: neck(99,84) head(99,77) -->
  <circle cx="99" cy="77" r="7" fill="#4caf50"/>
  <path d="M89 91 Q99 84 109 91 L109 97 L89 97 Z" fill="#4caf50"/>

  <!-- Bottom: neck(64,104) head(64,97) -->
  <circle cx="64" cy="97" r="7" fill="#4caf50"/>
  <path d="M54 111 Q64 104 74 111 L74 117 L54 117 Z" fill="#4caf50"/>

  <!-- Bottom-left: neck(29,84) head(29,77) -->
  <circle cx="29" cy="77" r="7" fill="#4caf50"/>
  <path d="M19 91 Q29 84 39 91 L39 97 L19 97 Z" fill="#4caf50"/>

  <!-- Top-left: neck(29,44) head(29,37) -->
  <circle cx="29" cy="37" r="7" fill="#4caf50"/>
  <path d="M19 51 Q29 44 39 51 L39 57 L19 57 Z" fill="#4caf50"/>

  <!-- Center circle -->
  <circle cx="64" cy="64" r="20" fill="#2d6a2d"/>
  <circle cx="64" cy="64" r="20" fill="none" stroke="#4caf50" stroke-width="1.5"/>

  <!-- Rosette: 3 interlocking circles, centers at dist=4.5 from (64,64) -->
  <circle cx="64"   cy="59.5" r="7" fill="none" stroke="white" stroke-width="1.6"/>
  <circle cx="60.1" cy="66.25" r="7" fill="none" stroke="white" stroke-width="1.6"/>
  <circle cx="67.9" cy="66.25" r="7" fill="none" stroke="white" stroke-width="1.6"/>
</svg>
