name: Deploy to Firebase Hosting on PR

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  changes:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🔍 Detect Flutter file changes
      id: filter
      run: |
        git fetch origin ${{ github.base_ref }} --depth=1
        CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
        if echo "$CHANGED" | grep -qE '^(lib/|web/|pubspec\.yaml|build-scripts/)'; then
          echo "frontend=true" >> $GITHUB_OUTPUT
        else
          echo "frontend=false" >> $GITHUB_OUTPUT
        fi

  frontend:
    needs: changes
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest

    outputs:
      preview_url: ${{ steps.deploy.outputs.details_url }}

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🔧 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version-file: .flutter-version

    - name: 📦 Install Dependencies
      run: |
        flutter clean
        flutter pub get

    - name: 🧪 Run Flutter Tests
      run: flutter test

    - name: 🕒 Set Version
      id: version
      run: |
        BUILD_NAME=$(TZ=Europe/Berlin date +"%Y.%m.%d")
        BUILD_NUMBER=$(TZ=Europe/Berlin date +"%H%M")
        echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
        echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
        echo "📦 Version ist ${BUILD_NAME}+${BUILD_NUMBER}"
        ./build-scripts/bump-version.sh "${BUILD_NAME}+${BUILD_NUMBER}"

    - name: 📝 Add Version to Summary
      run: |
        echo "### 🚀 Version: ${BUILD_NAME}+${BUILD_NUMBER}" >> $GITHUB_STEP_SUMMARY

    - name: 🧱 Build Web App
      run: flutter build web --release

    - name: 🔧 Install Firebase CLI
      run: npm install -g firebase-tools

    - name: 🚀 Deploy Preview to Firebase Hosting
      id: deploy
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-preview-key.json
      run: |
        echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_VEREINSAPPELL }}' > "$GOOGLE_APPLICATION_CREDENTIALS"

        BRANCH=$(echo "${{ github.head_ref }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//' | cut -c1-60)
        CHANNEL="pr${{ github.event.pull_request.number }}-${BRANCH}"

        set +e
        OUTPUT=$(firebase hosting:channel:deploy "$CHANNEL" \
          --expires 7d --project vereinsappell --json 2>&1)
        EXIT=$?
        set -e

        if [ $EXIT -eq 0 ]; then
          URL=$(echo "$OUTPUT" | python3 -c "
        import sys, json
        d = json.loads(sys.stdin.read())
        print(next(iter(d.get('result', {}).values())).get('url', ''))
        " 2>/dev/null || echo "")
        elif echo "$OUTPUT" | grep -q "is the current active version"; then
          URL=$(firebase hosting:channel:list --project vereinsappell --json | python3 -c "
        import sys, json
        needle = '$CHANNEL'.replace('_', '-')
        d = json.loads(sys.stdin.read())
        for ch in d.get('result', {}).get('channels', []):
            if ch.get('name', '').endswith('/' + needle):
                print(ch.get('url', ''))
                break
        " 2>/dev/null || echo "")
        else
          echo "Firebase deploy failed:"
          echo "$OUTPUT"
          exit 1
        fi

        echo "details_url=$URL" >> "$GITHUB_OUTPUT"

  backend:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    outputs:
      dev_url: ${{ steps.deploy.outputs.dev_url }}

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Install Test Dependencies
      run: pip install pytest boto3 requests pillow

    - name: 🧪 Run Backend Tests
      working-directory: aws_backend/lambda
      run: pytest tests/

    - name: 🔧 Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1

    - name: 🏗️ Build Lambda (manylinux deps)
      working-directory: aws_backend/lambda
      run: ./build.sh

    - name: 📦 Zip Lambda
      working-directory: aws_backend/lambda
      run: ./zip.sh

    - name: 🚀 Deploy to Lambda $LATEST
      id: deploy
      working-directory: aws_backend/lambda
      run: |
        aws lambda update-function-code \
          --function-name vereins-app-beta-lambda_backend \
          --zip-file fileb://lambda.zip
        API_ID=$(aws apigatewayv2 get-apis \
          --query "Items[?Name=='vereins-app-beta-api'].ApiId | [0]" \
          --output text)
        echo "dev_url=https://${API_ID}.execute-api.eu-central-1.amazonaws.com/dev" >> $GITHUB_OUTPUT

    - name: 🏗️ Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: 🔐 Write Firebase Service Account
      run: |
        mkdir -p aws_backend/secrets
        echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > aws_backend/secrets/firebase-service-account.json

    - name: 📋 Terraform Plan
      working-directory: aws_backend
      run: |
        terraform init -input=false
        terraform plan -no-color -input=false 2>&1 | tee /tmp/tf-plan.txt
        echo "### 🏗️ Terraform Plan" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        tail -20 /tmp/tf-plan.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/aws_backend/secrets/firebase-service-account.json

    - name: 🔧 Setup Firebase CLI
      run: npm install -g firebase-tools

    - name: 🔥 Deploy Firebase Database Rules
      run: firebase deploy --only database
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/aws_backend/secrets/firebase-service-account.json

  notify:
    needs: [frontend, backend]
    if: ${{ always() && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
    - name: 📨 Notify Telegram
      run: |
        FRONTEND_RESULT="${{ needs.frontend.result }}"
        BACKEND_RESULT="${{ needs.backend.result }}"

        if [ "$FRONTEND_RESULT" = "success" ] && [ "$BACKEND_RESULT" = "success" ]; then
          ENCODED_API=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${{ needs.backend.outputs.dev_url }}', safe=''))")
          PREVIEW_LINK="${{ needs.frontend.outputs.preview_url }}/?apiBaseUrl=${ENCODED_API}&applicationId=${{ secrets.PREVIEW_APPLICATION_ID }}&memberId=${{ secrets.PREVIEW_MEMBER_ID }}"
          MSG=$(printf '✅ PR Preview bereit\n${{ github.event.pull_request.title }}\n%s' "${PREVIEW_LINK}")
        elif [ "$FRONTEND_RESULT" = "skipped" ] && [ "$BACKEND_RESULT" = "success" ]; then
          MSG=$(printf '✅ Backend deployed (kein Flutter-Build nötig)\n${{ github.event.pull_request.title }}')
        elif [ "$FRONTEND_RESULT" = "skipped" ]; then
          MSG=$(printf '❌ Backend fehlgeschlagen\n${{ github.event.pull_request.title }}')
        elif [ "$FRONTEND_RESULT" = "success" ]; then
          ENCODED_API=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${{ needs.backend.outputs.dev_url }}', safe=''))")
          PREVIEW_LINK="${{ needs.frontend.outputs.preview_url }}/?apiBaseUrl=${ENCODED_API}&applicationId=${{ secrets.PREVIEW_APPLICATION_ID }}&memberId=${{ secrets.PREVIEW_MEMBER_ID }}"
          MSG=$(printf '⚠️ PR Preview bereit (Backend fehlgeschlagen)\n${{ github.event.pull_request.title }}\n%s' "${PREVIEW_LINK}")
        else
          MSG=$(printf '❌ PR Build fehlgeschlagen\n${{ github.event.pull_request.title }}\nFrontend: %s | Backend: %s' "$FRONTEND_RESULT" "$BACKEND_RESULT")
        fi

        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          --data-urlencode "text=${MSG}"
