name: Deploy legal texts to DynamoDB

on:
  push:
    branches:
      - main
    paths:
      - docs/legal/datenschutz.md
      - docs/legal/impressum.md

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-central-1
      TABLE_NAME: vereins-app-beta-legal-texts

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🗄️ Create DynamoDB table (if not exists)
        run: |
          aws dynamodb create-table \
            --table-name "$TABLE_NAME" \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region "$AWS_REGION" 2>&1 | grep -v ResourceInUseException || true
          aws dynamodb wait table-exists --table-name "$TABLE_NAME" --region "$AWS_REGION"

      - name: 📤 Upload Datenschutzerklärung
        run: |
          TEXT=$(cat docs/legal/datenschutz.md)
          aws dynamodb put-item \
            --table-name "$TABLE_NAME" \
            --item "{\"id\": {\"S\": \"datenschutz\"}, \"text\": {\"S\": $(echo "$TEXT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}}"

      - name: 📤 Upload Impressum
        run: |
          TEXT=$(cat docs/legal/impressum.md)
          aws dynamodb put-item \
            --table-name "$TABLE_NAME" \
            --item "{\"id\": {\"S\": \"impressum\"}, \"text\": {\"S\": $(echo "$TEXT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}}"

      - name: ✅ Verify
        run: |
          aws dynamodb get-item \
            --table-name "$TABLE_NAME" \
            --key '{"id": {"S": "datenschutz"}}' \
            --query 'Item.text.S' \
            --output text | head -3
          aws dynamodb get-item \
            --table-name "$TABLE_NAME" \
            --key '{"id": {"S": "impressum"}}' \
            --query 'Item.text.S' \
            --output text | head -3
