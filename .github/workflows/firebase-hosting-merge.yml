name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
    - main

permissions:
  checks: write
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    env:
      ANDROID_APP_ID: 1:336568095877:android:f757f959bbe6c96be8c5ec
      IOS_APP_ID: 1:336568095877:ios:5b61a9b5162f57d1e8c5ec
      TESTER_GROUP: Schuetzenlust

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🔧 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version-file: .flutter-version

    - name: 📦 Install Dependencies
      run: |
        flutter clean
        flutter pub get

    - name: 🧪 Run Flutter Tests
      run: flutter test

    - name: 🕒 Set Version
      id: version
      run: |
        BUILD_NAME=$(TZ=Europe/Berlin date +"%Y.%m.%d")
        BUILD_NUMBER=$(TZ=Europe/Berlin date +"%H%M")
        echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
        echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
        echo "version=${BUILD_NAME}+${BUILD_NUMBER}" >> $GITHUB_OUTPUT
        echo "📦 Version ist ${BUILD_NAME}+${BUILD_NUMBER}"
        ./build-scripts/bump-version.sh "${BUILD_NAME}+${BUILD_NUMBER}"

    - name: 📝 Add Version to Summary
      run: |
        echo "### 🚀 Version: ${BUILD_NAME}+${BUILD_NUMBER}" >> $GITHUB_STEP_SUMMARY

    - name: 🔥 Setup Firebase CLI
      run: npm install -g firebase-tools

    - name: 🔐 Authenticate Firebase CLI
      run: |
        cat <<EOF | jq > ${{ runner.temp }}/firebase-key.json
        ${{ secrets.FIREBASE_CI }}
        EOF
        firebase projects:list
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-key.json

    - name: 🧱 Build Web App
      run: ./build-scripts/build-web.sh $BUILD_NAME $BUILD_NUMBER

    - name: 🚀 Distribute Web App
      run: ./build-scripts/release-web.sh $BUILD_NAME $BUILD_NUMBER $ANDROID_APP_ID $TESTER_GROUP
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-key.json

    - name: 📱 Build Android APK
      run: ./build-scripts/build-apk.sh $BUILD_NAME $BUILD_NUMBER
      if: false

    - name: 🚀 Distribute Android APK
      run: ./build-scripts/release-apk.sh $BUILD_NAME $BUILD_NUMBER $ANDROID_APP_ID $TESTER_GROUP
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-key.json
      if: false

    - name: 🍏 Build iOS App (no signing)
      run: ./build-scripts/build-ios.sh $BUILD_NAME $BUILD_NUMBER
      if: false

    - name: 🚀 Distribute iOS IPA
      run: ./build-scripts/release-ios.sh $BUILD_NAME $BUILD_NUMBER $IOS_APP_ID $TESTER_GROUP
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-key.json
      if: false

  backend:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Install Test Dependencies
      run: pip install pytest boto3 requests pillow

    - name: 🧪 Run Backend Tests
      working-directory: aws_backend/lambda
      run: pytest tests/

    - name: 🔧 Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1

    - name: 🏗️ Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: 🔐 Write Firebase Service Account
      run: |
        mkdir -p aws_backend/secrets
        echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > aws_backend/secrets/firebase-service-account.json

    - name: 🔧 Setup Firebase CLI
      run: npm install -g firebase-tools

    - name: 🔥 Deploy Firebase Database Rules
      run: firebase deploy --only database
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/aws_backend/secrets/firebase-service-account.json

    - name: 🚀 Deploy Backend
      working-directory: aws_backend
      run: ./update_backend.sh
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/aws_backend/secrets/firebase-service-account.json

    - name: 🎯 Promote to prod
      working-directory: aws_backend/lambda
      run: ./promote.sh

  notify:
    needs: [frontend, backend]
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
    - name: 📨 Notify Telegram
      run: |
        FRONTEND=${{ needs.frontend.result }}
        BACKEND=${{ needs.backend.result }}
        VERSION="${{ needs.frontend.outputs.version }}"
        COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
        if [ "$FRONTEND" = "success" ] && [ "$BACKEND" = "success" ]; then
          STATUS="✅ Neue Version veröffentlicht"
        else
          STATUS="❌ Deploy fehlgeschlagen (frontend: ${FRONTEND}, backend: ${BACKEND})"
        fi
        MSG=$(printf '%s\n🏷 %s\n💬 %s\n🌐 https://vereinsappell.web.app' "$STATUS" "$VERSION" "$COMMIT_MSG")
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          --data-urlencode "text=${MSG}"
